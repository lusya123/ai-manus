name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
      - develop
      - custom
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
      - custom
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: sha-${{ github.sha }}
  DEPLOY_PATH: /home/ubuntu/ai-manus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, sandbox, claw, mockserver]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${owner}/ai-manus-${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'custom')

    steps:
      - name: Prepare deploy variables
        id: deploy
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ steps.deploy.outputs.owner }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: REGISTRY,OWNER,IMAGE_TAG,DEPLOY_PATH,GHCR_TOKEN,GHCR_USER
          script: |
            set -eu
            cd "$DEPLOY_PATH"

            cat > docker-compose.deploy.yml <<EOF
            services:
              frontend:
                image: ${REGISTRY}/${OWNER}/ai-manus-frontend:${IMAGE_TAG}
                ports:
                  - "18081:80"
                environment:
                  - BACKEND_URL=http://backend:8000

              backend:
                image: ${REGISTRY}/${OWNER}/ai-manus-backend:${IMAGE_TAG}
                depends_on:
                  - mongodb
                  - redis
                  - mockserver
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock:ro
                environment:
                  - MONGODB_URI=mongodb://mongodb:27017
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                  - SANDBOX_NETWORK=manus-network
                  - CLAW_NETWORK=manus-network
                  - MANUS_API_BASE_URL=http://backend:8000
                  - SANDBOX_IMAGE=${REGISTRY}/${OWNER}/ai-manus-sandbox:${IMAGE_TAG}
                  - CLAW_IMAGE=${REGISTRY}/${OWNER}/ai-manus-claw:${IMAGE_TAG}

              sandbox:
                image: ${REGISTRY}/${OWNER}/ai-manus-sandbox:${IMAGE_TAG}

              claw:
                image: ${REGISTRY}/${OWNER}/ai-manus-claw:${IMAGE_TAG}

              mockserver:
                image: ${REGISTRY}/${OWNER}/ai-manus-mockserver:${IMAGE_TAG}
                restart: unless-stopped
                environment:
                  - MOCK_DATA_FILE=default.yaml
                  - MOCK_DELAY=1
                networks:
                  - manus-network
            EOF

            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            docker compose -p ai-manus -f docker-compose.yml -f docker-compose.deploy.yml pull frontend backend sandbox claw mockserver
            docker compose -p ai-manus -f docker-compose.yml -f docker-compose.deploy.yml up -d --remove-orphans frontend backend mongodb redis mockserver
            docker compose -p ai-manus -f docker-compose.yml -f docker-compose.deploy.yml up --no-start sandbox claw
            docker image prune -f
