services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage  # Use build stage image instead of production image
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]  # Start in development mode and listen on all network interfaces
    volumes:
      - ./frontend:/app  # Mount source code directory
      - /app/node_modules  # Avoid overwriting container's node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"  # Vite default development port
    environment:
      - NODE_ENV=development
      #- VITE_API_URL=http://127.0.0.1:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - manus-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      [
        "uv", "run", 
        "debugpy", "--listen", "0.0.0.0:5678", "-m", # Enable debug
        "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload",
        "--timeout-graceful-shutdown","0"
      ]
    volumes:
      - ./backend:/app  # Mount source code directory
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "5678:5678" # Debug port
    depends_on:
      sandbox:
        condition: service_started
        required: false
      claw:
        condition: service_started
        required: false
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    restart: unless-stopped
    networks:
      - manus-network
    env_file:
      - .env
    environment:
      - SANDBOX_ADDRESS=sandbox # Use single container as sandbox
      - CLAW_ADDRESS=claw       # Use single fixed claw container in development
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MANUS_API_BASE_URL=http://backend:8000
      - CLAW_API_KEY=${CLAW_DEV_API_KEY:-manus-dev-api-key-changeme}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-http://localhost:5173}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
      - FRONTEND_INTERNAL_URL=${FRONTEND_INTERNAL_URL:-http://frontend-dev:5173}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8000}
      - FRONTEND_SANDBOX_URL=${FRONTEND_SANDBOX_URL:-http://frontend-dev:5173}
      - BACKEND_SANDBOX_URL=${BACKEND_SANDBOX_URL:-http://backend:8000}
      - CLAW_PUBLIC_URL=${CLAW_PUBLIC_URL:-http://localhost:18788}
      - CLAW_INTERNAL_URL=${CLAW_INTERNAL_URL:-http://claw:18788}

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "${SANDBOX_CDP_PORT:-9222}:9222"
      - "5902:5900"
      - "${SANDBOX_VNC_PORT:-5901}:5901"
      - "${SANDBOX_API_PORT:-8080}:8080"
    environment:
      - UVI_ARGS="--reload"
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    restart: unless-stopped
    networks:
      - manus-network

  claw:
    build:
      context: ./claw
      dockerfile: Dockerfile
    hostname: claw
    ports:
      - "18788:18788" # manus-claw HTTP server
    environment:
      - CLAW_TTL_SECONDS=0        # No TTL in development (0 = unlimited)
      - MANUS_API_BASE_URL=http://backend:8000
      - MANUS_API_KEY=${CLAW_DEV_API_KEY:-manus-dev-api-key-changeme}
    restart: unless-stopped
    networks:
      - manus-network

  mockserver:
    build:
      context: ./mockserver
      dockerfile: Dockerfile
    volumes:
      - ./mockserver:/app  # Mount source code directory
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    restart: unless-stopped
    environment:
      - MOCK_DATA_FILE=default.yaml
      - MOCK_DELAY=1
    networks:
      - manus-network

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - manus-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - manus-network

volumes:
  mongodb_data:
    name: manus-mongodb-data

networks:
  manus-network:
    name: manus-network
    driver: bridge
